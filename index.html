<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產配置管理系統 v18.0 - 精準對齊 Excel 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 1.5rem; }
        .gold-text { color: #fbbf24; }
        .stock-text { color: #60a5fa; }
        input, select { background-color: #020617 !important; border: 1px solid #334155 !important; color: white !important; border-radius: 10px; padding: 0.6rem; outline: none; }
        .tab-active { border-bottom: 4px solid #6366f1; color: #818cf8; }
        .editing-mode { border-color: #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .btn-action { transition: 0.2s; cursor: pointer; }
        .btn-action:hover { opacity: 0.8; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 pb-6 border-b border-slate-800 gap-4">
            <div>
                <h1 class="text-3xl font-black gold-text italic">資產配置 v18.0</h1>
                <p class="text-slate-500 text-xs mt-1">精準對齊 Excel 邏輯 (實際成本 17.73 模式)</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="exportAllData()" class="bg-slate-700 btn-action px-5 py-2.5 rounded-full text-xs font-bold shadow-lg">📦 備份全部</button>
                <button onclick="importAllData()" class="bg-emerald-600 btn-action px-5 py-2.5 rounded-full text-xs font-bold shadow-lg">📥 恢復/匯入 JSON</button>
                <button onclick="fetchAllPrices()" class="bg-indigo-600 btn-action px-5 py-2.5 rounded-full text-xs font-bold shadow-lg">🔄 刷新金價</button>
            </div>
        </header>

        <section class="mb-8 card border-l-4 border-indigo-500 bg-indigo-500/5">
            <h3 class="text-xs font-bold mb-4 text-indigo-300">股票現價獨立輸入 (輸入後影響全表)</h3>
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex flex-col gap-1 text-[10px]">
                    <label class="text-gray-500">代號</label>
                    <input type="text" id="market-code" placeholder="00878" class="w-28 uppercase">
                </div>
                <div class="flex flex-col gap-1 text-[10px]">
                    <label class="text-gray-500">現價</label>
                    <input type="number" step="0.01" id="market-price" class="w-28">
                </div>
                <button onclick="updateMarketPrice()" class="bg-indigo-600 px-6 py-2.5 rounded-xl text-sm font-bold btn-action">更新現價</button>
                <div id="price-tags" class="flex gap-2 mb-1"></div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-10 text-center">
            <div class="card lg:col-span-1 flex flex-col items-center justify-center relative min-h-[200px]">
                <canvas id="allocationChart"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="text-[10px] text-gray-500">總資產現值</span>
                    <span id="center-total-worth" class="text-lg font-black text-white">--</span>
                </div>
            </div>
            <div class="lg:col-span-4 grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="card border-t-2 border-blue-500/50"><span class="text-gray-500 text-xs">總成本</span><div id="total-cost-ui" class="text-xl font-black mt-2">--</div></div>
                <div class="card border-t-2 border-green-500/50"><span class="text-gray-500 text-xs">總累積股利</span><div id="total-dividends" class="text-xl font-black text-green-400 mt-2">--</div></div>
                <div class="card border-t-2 border-yellow-500/50"><span class="text-gray-500 text-xs">實際成本(每股)</span><div id="real-cost-per-share" class="text-xl font-black gold-text mt-2">--</div></div>
                <div class="card border-t-2 border-emerald-500/50"><span class="text-gray-500 text-xs">總報酬率(含息)</span><div id="total-percent" class="text-xl font-black mt-2">--</div><div id="total-profit-money" class="text-[10px]">--</div></div>
            </div>
        </section>

        <div class="flex space-x-8 mb-6 border-b border-slate-800 font-bold text-sm">
            <button id="tab-stock" onclick="switchTab('stock')" class="pb-4 px-2 tab-active">股票交易管理</button>
            <button id="tab-gold" onclick="switchTab('gold')" class="pb-4 px-2 text-gray-500">黃金資產管理</button>
        </div>

        <div id="section-stock">
            <div id="stock-input-card" class="card border-l-4 border-blue-500 bg-slate-900/30 mb-8">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 text-xs">
                    <input type="hidden" id="stock-edit-idx" value="-1">
                    <div class="flex flex-col gap-1"><label class="text-gray-500">標的代號</label><input type="text" id="stock-code" class="uppercase"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">購買日期</label><input type="date" id="stock-date"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">類型</label><select id="stock-type" onchange="toggleStockDiv()"><option value="buy">買入</option><option value="dividend">股利再投入</option></select></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">股數</label><input type="number" id="stock-shares"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">成交單價</label><input type="number" step="0.01" id="stock-buy-price"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">總持有成本</label><input type="number" id="stock-cost"></div>
                    <div id="stock-div-field" class="hidden flex flex-col gap-1"><label class="text-green-500 font-bold">配發股利</label><input type="number" id="stock-div-amount"></div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button id="stock-btn" onclick="saveStock()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold btn-action">登錄/更新交易</button>
                    <button id="stock-cancel" onclick="clearStockForm()" class="hidden bg-slate-700 px-6 rounded-xl font-bold">取消</button>
                </div>
            </div>
            <div class="card overflow-x-auto p-0">
                <table class="w-full text-xs text-left"><thead class="bg-slate-900/50 text-gray-500"><tr><th class="p-4">日期</th><th class="p-4">標的</th><th class="p-4 text-right">股數</th><th class="p-4 text-right">持有成本</th><th class="p-4 text-right">市值/損益</th><th class="p-4 text-center">操作</th></tr></thead><tbody id="stock-list" class="divide-y divide-slate-800 font-mono"></tbody></table>
            </div>
        </div>

        <div id="section-gold" class="hidden">
            <div class="card border-l-4 border-amber-500 bg-slate-900/30 mb-8">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs">
                    <div class="flex flex-col gap-1"><label class="text-gray-500">名稱</label><input type="text" id="gold-name" placeholder="實體金條"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">重量</label><input type="number" step="0.01" id="gold-weight"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">單位</label><select id="gold-unit"><option value="g">公克 (g)</option><option value="ts">台錢</option></select></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-500">購入成本</label><input type="number" id="gold-cost"></div>
                </div>
                <button onclick="saveGold()" class="w-full mt-6 bg-amber-600 py-3 rounded-xl font-bold text-black btn-action">登錄黃金紀錄</button>
            </div>
            <div class="card overflow-x-auto p-0"><table class="w-full text-xs text-left"><thead class="bg-slate-900/50 text-gray-500"><tr><th class="p-4">名稱</th><th class="p-4 text-right">重量</th><th class="p-4 text-right">成本</th><th class="p-4 text-right">預估現值</th><th class="p-4 text-center">操作</th></tr></thead><tbody id="gold-list" class="divide-y divide-slate-800"></tbody></table></div>
        </div>
    </div>

    <script>
        const K_STK = 'WV18_STK_FIX', K_GLD = 'WV18_GLD_FIX', K_PRC = 'WV18_PRC_FIX';
        let stockRecs = JSON.parse(localStorage.getItem(K_STK)) || [];
        let goldRecs = JSON.parse(localStorage.getItem(K_GLD)) || [];
        let marketPrices = JSON.parse(localStorage.getItem(K_PRC)) || {};
        let curGoldUSD = 0, rateUSD = 32.75;

        // --- 核心計算 (對齊 Excel) ---
        function updateUI() {
            const goldTWD_g = (curGoldUSD / 31.1035) * rateUSD;
            let totalSTKV = 0, totalSTKC = 0, totalDiv = 0, totalSTKShares = 0;
            let totalGOLDV = 0, totalGOLDC = 0;

            // 股票處理
            let sH = '';
            const sortedStock = stockRecs.map((r, i) => ({...r, ori: i})).sort((a,b)=>new Date(b.date)-new Date(a.date));
            
            sortedStock.forEach((r) => {
                const nowP = marketPrices[r.code] || r.buyPrice;
                const val = nowP * r.shares;
                totalSTKV += val;
                totalDiv += (r.dividend || 0);
                totalSTKC += (r.cost || 0);
                totalSTKShares += r.shares;

                const profit = val - r.cost;
                const pColor = profit >= 0 ? 'text-green-400' : 'text-red-400';

                sH += `<tr class="hover:bg-slate-800/30">
                    <td class="p-4 text-gray-500">${r.date}</td>
                    <td class="p-4 font-bold text-blue-400">${r.code}</td>
                    <td class="p-4 text-right">${r.shares.toLocaleString()}</td>
                    <td class="p-4 text-right">$${r.cost.toLocaleString()}</td>
                    <td class="p-4 text-right"><div class="font-bold text-white">$${Math.round(val).toLocaleString()}</div><div class="${pColor} text-[10px]">${profit >= 0 ? '+':''}${Math.round(profit).toLocaleString()}</div></td>
                    <td class="p-4 text-center"><button onclick="editStock(${r.ori})" class="text-blue-400 mr-3">✎</button><button onclick="del('stk',${r.ori})">✕</button></td>
                </tr>`;
            });
            document.getElementById('stock-list').innerHTML = sH || '<tr><td colspan="6" class="p-10 text-center">暫無資料</td></tr>';

            // 黃金處理
            let gH = '';
            goldRecs.forEach((r, i) => {
                let w = r.weight; if(r.unit==='ts') w *= 3.75;
                const val = w * goldTWD_g; totalGOLDV += val; totalGOLDC += r.cost;
                gH += `<tr class="hover:bg-slate-800/30"><td class="p-4 font-bold text-amber-400">${r.name}</td><td class="p-4 text-right">${r.weight}${r.unit}</td><td class="p-4 text-right">$${r.cost.toLocaleString()}</td><td class="p-4 text-right font-bold text-white">$${Math.round(val).toLocaleString()}</td><td class="p-4 text-center"><button onclick="del('gold',${i})">✕</button></td></tr>`;
            });
            document.getElementById('gold-list').innerHTML = gH;

            // 看板數值更新
            const totalCost = totalSTKC + totalGOLDC;
            const currentWorth = totalSTKV + totalGOLDV;
            const totalProfit = (currentWorth + totalDiv) - totalCost;
            const perf = totalCost > 0 ? (totalProfit / totalCost * 100).toFixed(2) : 0;
            const realCostPerShare = totalSTKShares > 0 ? ((totalSTKC - totalDiv) / totalSTKShares).toFixed(2) : 0;

            document.getElementById('total-cost-ui').innerText = `$${totalCost.toLocaleString()}`;
            document.getElementById('total-dividends').innerText = `$${totalDiv.toLocaleString()}`;
            document.getElementById('real-cost-per-share').innerText = realCostPerShare;
            document.getElementById('center-total-worth').innerText = `$${Math.round(currentWorth).toLocaleString()}`;
            document.getElementById('total-percent').innerText = `${perf}%`;
            document.getElementById('total-percent').className = `text-xl font-black mt-2 ${perf >= 0 ? 'text-green-400':'text-red-400'}`;
            document.getElementById('total-profit-money').innerText = `損益: ${Math.round(totalProfit).toLocaleString()}`;

            renderPriceTags();
            renderAllocation(totalGOLDV, totalSTKV);
        }

        // --- 功能邏輯 ---
        function saveStock() {
            const idx = parseInt(document.getElementById('stock-edit-idx').value);
            const r = { code: document.getElementById('stock-code').value.toUpperCase(), date: document.getElementById('stock-date').value || new Date().toISOString().split('T')[0], type: document.getElementById('stock-type').value, shares: parseFloat(document.getElementById('stock-shares').value)||0, buyPrice: parseFloat(document.getElementById('stock-buy-price').value)||0, cost: parseFloat(document.getElementById('stock-cost').value)||0, dividend: parseFloat(document.getElementById('stock-div-amount').value)||0 };
            if(!r.code) return;
            if(idx === -1) stockRecs.push(r); else stockRecs[idx] = r;
            saveAll(); clearStockForm(); updateUI();
        }
        function editStock(i) {
            const r = stockRecs[i]; document.getElementById('stock-edit-idx').value = i;
            document.getElementById('stock-code').value = r.code; document.getElementById('stock-date').value = r.date;
            document.getElementById('stock-type').value = r.type; document.getElementById('stock-shares').value = r.shares;
            document.getElementById('stock-buy-price').value = r.buyPrice; document.getElementById('stock-cost').value = r.cost;
            document.getElementById('stock-div-amount').value = r.dividend || 0; toggleStockDiv();
            document.getElementById('stock-input-card').classList.add('editing-mode');
            document.getElementById('stock-cancel').classList.remove('hidden');
        }
        function clearStockForm() { document.getElementById('stock-edit-idx').value = "-1"; document.getElementById('stock-input-card').classList.remove('editing-mode'); document.getElementById('stock-cancel').classList.add('hidden'); }
        function updateMarketPrice() { const c = document.getElementById('market-code').value.toUpperCase(); const p = parseFloat(document.getElementById('market-price').value); if(c && !isNaN(p)) { marketPrices[c] = p; saveAll(); updateUI(); } }
        function deletePrice(c) { delete marketPrices[c]; saveAll(); updateUI(); }
        function renderPriceTags() { let h = ''; for(let c in marketPrices) { h += `<div class="bg-indigo-900/40 px-3 py-1 rounded-lg text-[10px] border border-indigo-700 flex items-center gap-2">${c}: $${marketPrices[c]}<button onclick="deletePrice('${c}')">✕</button></div>`; } document.getElementById('price-tags').innerHTML = h; }
        function saveGold() { const r = { name: document.getElementById('gold-name').value, weight: parseFloat(document.getElementById('gold-weight').value), unit: document.getElementById('gold-unit').value, cost: parseFloat(document.getElementById('gold-cost').value) }; goldRecs.push(r); saveAll(); updateUI(); }
        function del(t, i) { if(confirm("刪除？")) { if(t==='stk') stockRecs.splice(i,1); else goldRecs.splice(i,1); saveAll(); updateUI(); } }
        function switchTab(t) { document.getElementById('section-stock').classList.toggle('hidden', t!=='stock'); document.getElementById('section-gold').classList.toggle('hidden', t!=='gold'); }
        function saveAll() { localStorage.setItem(K_STK, JSON.stringify(stockRecs)); localStorage.setItem(K_GLD, JSON.stringify(goldRecs)); localStorage.setItem(K_PRC, JSON.stringify(marketPrices)); }
        function exportAllData() { const s = JSON.stringify({ stocks: stockRecs, golds: goldRecs, prices: marketPrices }); const el = document.createElement('textarea'); el.value = s; document.body.appendChild(el); el.select(); document.execCommand('copy'); alert("備份已複製"); }
        function importAllData() { const raw = prompt("貼上 JSON:"); if(!raw) return; try { const d = JSON.parse(raw); stockRecs = d.stocks || d; goldRecs = d.golds || []; marketPrices = d.prices || {}; saveAll(); updateUI(); alert("成功"); } catch(e){ alert("錯誤"); } }
        function toggleStockDiv() { document.getElementById('stock-div-field').classList.toggle('hidden', document.getElementById('stock-type').value !== 'dividend'); }
        async function fetchAllPrices() { try { const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT'); const d = await res.json(); curGoldUSD = parseFloat(d.price); updateUI(); } catch(e){} }
        let allocChart;
        function renderAllocation(g, s){
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if(allocChart) allocChart.destroy();
            allocChart = new Chart(ctx, { type:'doughnut', data:{ datasets:[{ data:[g||1,s||1], backgroundColor:['#fbbf24','#3b82f6'], borderWidth:0 }]}, options:{ cutout:'85%', plugins:{tooltip:{enabled:false}} }});
        }
        updateUI(); fetchAllPrices();
    </script>
</body>
</html>
