<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Vision v20.0 - 隱私強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; border-radius: 24px; padding: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .stat-label { color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        .gold-text { color: #fbbf24; }
        input, select { background-color: #020617 !important; border: 1px solid #334155 !important; color: white !important; border-radius: 12px; padding: 0.75rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #6366f1 !important; }
        .tab-active { color: #818cf8; border-bottom: 3px solid #6366f1; }
        .editing-mode { border: 2px solid #fbbf24 !important; }
        .btn-primary { background: linear-gradient(to right, #4f46e5, #6366f1); transition: all 0.3s; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .chart-container { position: relative; height: 320px; width: 100%; }
        /* 隱私遮罩樣式 */
        .privacy-masked { filter: blur(4px); pointer-events: none; }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 pb-6 border-b border-slate-800 gap-6">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-amber-200 via-indigo-400 to-emerald-400">Wealth Vision v20.0</h1>
                <p class="text-slate-500 text-xs mt-2 font-bold uppercase tracking-widest">Premium Asset Management Interface</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="togglePrivacy()" id="privacy-btn" class="bg-slate-800 hover:bg-slate-700 px-6 py-2.5 rounded-xl text-xs font-bold border border-slate-700 text-amber-400">👁️ 顯示數值</button>
                <button onclick="changePassword()" class="btn-ghost px-4 py-2.5 rounded-xl text-xs font-bold text-slate-400">🔑 修改密碼</button>
                <button onclick="exportAllData()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2.5 rounded-xl text-xs font-bold border border-slate-700">📦 備份全部</button>
                <button onclick="fetchAllPrices()" class="btn-primary px-6 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-indigo-500/20">🔄 刷新即時數據</button>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="card lg:col-span-2">
                <h3 class="stat-label mb-6 flex items-center gap-2"><span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span> Asset Growth Trend</h3>
                <div class="chart-container" id="chart-area">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="card flex flex-col items-center justify-center">
                <h3 class="stat-label mb-6">Allocation</h3>
                <div class="relative w-full aspect-square max-h-[240px]">
                    <canvas id="allocationChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span class="text-[10px] text-slate-500 font-bold uppercase">Net Worth</span>
                        <span id="center-total-worth" class="text-xl font-black">--</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card border-t-4 border-blue-500 bg-blue-500/5">
                <h3 class="stat-label text-blue-400 mb-4">Stock Management</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-500">資產現值</span><span id="stock-worth" class="text-xl font-bold">--</span></div>
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-500">含息報酬率</span><span id="stock-perf" class="text-xl font-black">--</span></div>
                    <div class="flex justify-between items-end font-mono"><span class="text-xs text-slate-500">實際成本(股)</span><span id="real-cost-per-share" class="text-sm gold-text">--</span></div>
                </div>
            </div>
            <div class="card border-t-4 border-amber-500 bg-amber-500/5">
                <h3 class="stat-label text-amber-400 mb-4">Gold Management</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-500">資產現值</span><span id="gold-worth" class="text-xl font-bold">--</span></div>
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-500">黃金報酬率</span><span id="gold-perf" class="text-xl font-black">--</span></div>
                    <div class="flex justify-between items-end font-mono"><span class="text-xs text-slate-500">總持倉重量</span><span id="gold-total-weight" class="text-sm text-amber-200">--</span></div>
                </div>
            </div>
            <div class="card border-t-4 border-emerald-500 bg-emerald-500/10">
                <h3 class="stat-label text-emerald-400 mb-4">Consolidated</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-400">總投入成本</span><span id="total-all-cost" class="text-xl font-bold">--</span></div>
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-400">總資產現值</span><span id="total-all-worth" class="text-xl font-bold text-emerald-400">--</span></div>
                    <div class="flex justify-between items-end"><span class="text-xs text-slate-400">總報酬率</span><span id="total-all-perf" class="text-xl font-black">--</span></div>
                </div>
            </div>
        </section>

        <div class="flex space-x-12 mb-8 border-b border-slate-800">
            <button id="tab-stock" onclick="switchTab('stock')" class="pb-4 text-sm font-bold tab-active tracking-widest uppercase">Stock</button>
            <button id="tab-gold" onclick="switchTab('gold')" class="pb-4 text-sm font-bold text-slate-500 tracking-widest uppercase">Gold</button>
        </div>

        <div id="section-stock">
            <div id="stock-input-card" class="card mb-8">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                    <input type="hidden" id="stock-edit-idx" value="-1">
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">標的代號</label><input type="text" id="stock-code" class="uppercase"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">購買日期</label><input type="date" id="stock-date"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">交易類型</label><select id="stock-type" onchange="toggleStockDiv()"><option value="buy">買入</option><option value="dividend">股利再投入</option></select></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">股數</label><input type="number" id="stock-shares"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">成交單價</label><input type="number" step="0.01" id="stock-buy-price"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">總投入成本</label><input type="number" id="stock-cost"></div>
                    <div id="stock-div-field" class="hidden flex flex-col gap-1"><label class="stat-label text-[10px] text-emerald-400">配發股利</label><input type="number" id="stock-div-amount"></div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button id="stock-btn" onclick="saveStock()" class="flex-1 btn-primary py-4 rounded-xl font-bold uppercase tracking-widest text-sm">確認登錄數據</button>
                    <button id="stock-cancel" onclick="clearStockForm()" class="hidden bg-slate-700 px-8 rounded-xl font-bold">取消</button>
                </div>
            </div>
            <div class="card overflow-hidden p-0"><table class="w-full text-xs text-left"><thead class="bg-slate-800/50 text-slate-500 uppercase font-bold"><tr><th class="p-5">日期</th><th class="p-5">標的</th><th class="p-5 text-right">股數</th><th class="p-5 text-right">投入成本</th><th class="p-5 text-right">市場現值</th><th class="p-5 text-center">管理</th></tr></thead><tbody id="stock-list" class="divide-y divide-slate-800"></tbody></table></div>
        </div>

        <div id="section-gold" class="hidden">
            <div id="gold-input-card" class="card mb-8">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <input type="hidden" id="gold-edit-idx" value="-1">
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">資產名稱</label><input type="text" id="gold-name" placeholder="實體金條/黃金存摺"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">購買日期</label><input type="date" id="gold-date"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">持有重量</label><input type="number" step="0.001" id="gold-weight"></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">單位</label><select id="gold-unit"><option value="g">公克 (g)</option><option value="ts">台錢</option></select></div>
                    <div class="flex flex-col gap-1"><label class="stat-label text-[10px]">總購入成本</label><input type="number" id="gold-cost"></div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button id="gold-btn" onclick="saveGold()" class="flex-1 bg-amber-600 hover:bg-amber-500 py-4 rounded-xl font-bold text-black uppercase tracking-widest text-sm transition-all">登錄黃金紀錄</button>
                    <button id="gold-cancel" onclick="clearGoldForm()" class="hidden bg-slate-700 px-8 rounded-xl font-bold">取消</button>
                </div>
            </div>
            <div class="card overflow-hidden p-0"><table class="w-full text-xs text-left"><thead class="bg-slate-800/50 text-slate-500 uppercase font-bold"><tr><th class="p-5">購買日期</th><th class="p-5">名稱</th><th class="p-5 text-right">重量</th><th class="p-5 text-right">購入成本</th><th class="p-5 text-right">預估現值</th><th class="p-5 text-center">管理</th></tr></thead><tbody id="gold-list" class="divide-y divide-slate-800"></tbody></table></div>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-full max-w-lg px-4">
            <div class="bg-slate-900/90 backdrop-blur-xl border border-slate-700 p-4 rounded-3xl shadow-2xl flex items-center gap-4">
                <input type="text" id="market-code" placeholder="代號" class="w-24 uppercase !py-2 !text-sm">
                <input type="number" step="0.01" id="market-price" placeholder="現價" class="w-24 !py-2 !text-sm">
                <button onclick="updateMarketPrice()" class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-black uppercase flex-1">更新股價</button>
                <div id="price-tags" class="hidden md:flex gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const K_STK = 'WV20_STK', K_GLD = 'WV20_GLD', K_PRC = 'WV20_PRC', K_PWD = 'WV20_PWD';
        let stockRecs = JSON.parse(localStorage.getItem(K_STK)) || [];
        let goldRecs = JSON.parse(localStorage.getItem(K_GLD)) || [];
        let marketPrices = JSON.parse(localStorage.getItem(K_PRC)) || {};
        let userPassword = localStorage.getItem(K_PWD) || '000000';
        let curGoldUSD = 0, rateUSD = 32.75;
        
        // 隱私模式狀態：預設隱蔽
        let isPrivacyMode = true;

        // --- 隱私核心邏輯 ---
        function togglePrivacy() {
            if (isPrivacyMode) {
                const input = prompt("輸入管理密碼解除遮罩：");
                if (input === userPassword) {
                    isPrivacyMode = false;
                    updateUI();
                } else if (input !== null) {
                    alert("密碼錯誤！");
                }
            } else {
                isPrivacyMode = true;
                updateUI();
            }
        }

        function changePassword() {
            const old = prompt("輸入舊密碼：");
            if (old === userPassword) {
                const n = prompt("輸入新密碼：");
                if (n && n.length >= 4) {
                    userPassword = n;
                    localStorage.setItem(K_PWD, n);
                    alert("密碼已更新");
                }
            } else if (old !== null) alert("驗證失敗");
        }

        // 格式化數字，若隱私模式則返回星號
        function fNum(val, isPrice = true) {
            if (isPrivacyMode) return "****";
            if (typeof val !== 'number') return val;
            return isPrice ? `$${Math.round(val).toLocaleString()}` : `${val.toFixed(2)}%`;
        }

        // --- 核心運算 ---
        function updateUI() {
            const goldTWD_g = (curGoldUSD / 31.1035) * rateUSD;
            let sV = 0, sC = 0, sD = 0, sShares = 0;
            let gV = 0, gC = 0, gW = 0;

            // 股票處理
            let sH = '';
            stockRecs.map((r, i) => ({...r, ori: i})).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => {
                const nowP = marketPrices[r.code] || r.buyPrice;
                const val = nowP * r.shares;
                sV += val; sD += (r.dividend || 0); sC += r.cost; sShares += r.shares;
                const profit = val - r.cost;
                sH += `<tr class="hover:bg-slate-800/30">
                    <td class="p-5 text-slate-500">${r.date}</td>
                    <td class="p-5 font-bold text-blue-400">${r.code}</td>
                    <td class="p-5 text-right">${isPrivacyMode ? '***' : r.shares.toLocaleString()}</td>
                    <td class="p-5 text-right">${fNum(r.cost)}</td>
                    <td class="p-5 text-right">
                        <div class="font-bold">${fNum(val)}</div>
                        <div class="${profit>=0?'text-emerald-400':'text-rose-400'} text-[10px] font-bold">
                            ${isPrivacyMode ? '***' : (profit>=0?'+':'')+Math.round(profit).toLocaleString()}
                        </div>
                    </td>
                    <td class="p-5 text-center"><button onclick="editStock(${r.ori})" class="text-blue-400 mr-4 hover:scale-125 transition">✎</button><button onclick="del('stk',${r.ori})" class="text-slate-600 hover:text-rose-500">✕</button></td>
                </tr>`;
            });
            document.getElementById('stock-list').innerHTML = sH || '<tr><td colspan="6" class="p-10 text-center text-slate-600">NO DATA</td></tr>';

            // 黃金處理
            let gH = '';
            goldRecs.map((r, i) => ({...r, ori: i})).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => {
                let w = r.weight; if(r.unit==='ts') w *= 3.75;
                const val = w * goldTWD_g;
                gV += val; gC += r.cost; gW += w;
                const profit = val - r.cost;
                gH += `<tr class="hover:bg-slate-800/30">
                    <td class="p-5 text-slate-500">${r.date || '---'}</td>
                    <td class="p-5 font-bold text-amber-400">${r.name}</td>
                    <td class="p-5 text-right">${isPrivacyMode ? '***' : r.weight + r.unit}</td>
                    <td class="p-5 text-right">${fNum(r.cost)}</td>
                    <td class="p-5 text-right">
                        <div class="font-bold">${fNum(val)}</div>
                        <div class="${profit>=0?'text-emerald-400':'text-rose-400'} text-[10px] font-bold">
                            ${isPrivacyMode ? '***' : (profit>=0?'+':'')+Math.round(profit).toLocaleString()}
                        </div>
                    </td>
                    <td class="p-5 text-center"><button onclick="editGold(${r.ori})" class="text-amber-400 mr-4 hover:scale-125 transition">✎</button><button onclick="del('gold',${r.ori})" class="text-slate-600 hover:text-rose-500">✕</button></td>
                </tr>`;
            });
            document.getElementById('gold-list').innerHTML = gH || '<tr><td colspan="6" class="p-10 text-center text-slate-600">NO DATA</td></tr>';

            // 看板數值更新
            document.getElementById('privacy-btn').innerText = isPrivacyMode ? "👁️ 顯示數值" : "🔒 隱藏數值";
            document.getElementById('chart-area').className = isPrivacyMode ? "chart-container privacy-masked" : "chart-container";

            document.getElementById('stock-worth').innerText = fNum(sV);
            const sPerf = sC > 0 ? (((sV + sD) - sC) / sC * 100) : 0;
            document.getElementById('stock-perf').innerText = fNum(sPerf, false);
            document.getElementById('real-cost-per-share').innerText = isPrivacyMode ? "****" : (sShares > 0 ? ((sC - sD) / sShares).toFixed(2) : '0.00');

            document.getElementById('gold-worth').innerText = fNum(gV);
            const gPerf = gC > 0 ? ((gV - gC) / gC * 100) : 0;
            document.getElementById('gold-perf').innerText = fNum(gPerf, false);
            document.getElementById('gold-total-weight').innerText = isPrivacyMode ? "****" : `${gW.toFixed(2)} g`;

            const tC = sC + gC;
            const tV = sV + gV;
            const tPerf = tC > 0 ? (((tV + sD) - tC) / tC * 100) : 0;
            document.getElementById('total-all-cost').innerText = fNum(tC);
            document.getElementById('total-all-worth').innerText = fNum(tV);
            document.getElementById('total-all-perf').innerText = fNum(tPerf, false);
            document.getElementById('center-total-worth').innerText = fNum(tV);

            renderCharts(gV, sV);
            renderPriceTags();
        }

        // --- 商業化圖表 ---
        let trendChartObj, allocChartObj;
        function renderCharts(gV, sV) {
            const ctxA = document.getElementById('allocationChart').getContext('2d');
            if(allocChartObj) allocChartObj.destroy();
            allocChartObj = new Chart(ctxA, {
                type: 'doughnut',
                data: {
                    labels: ['Gold', 'Stock'],
                    datasets: [{
                        data: [gV || 1, sV || 1],
                        backgroundColor: ['#fbbf24', '#3b82f6'],
                        borderWidth: 0,
                        borderRadius: 10
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });

            const timeline = [
                ...stockRecs.map(r => ({ date: r.date, type: 's', cost: r.cost })),
                ...goldRecs.map(r => ({ date: r.date, type: 'g', cost: r.cost }))
            ].sort((a,b) => new Date(a.date) - new Date(b.date));

            const labels = [], sData = [], gData = [], tData = [];
            let curS = 0, curG = 0;
            timeline.forEach(h => {
                labels.push(h.date);
                if(h.type==='s') curS += h.cost; else curG += h.cost;
                sData.push(curS); gData.push(curG); tData.push(curS + curG);
            });

            const ctxT = document.getElementById('trendChart').getContext('2d');
            if(trendChartObj) trendChartObj.destroy();
            trendChartObj = new Chart(ctxT, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Total', data: tData, borderColor: '#10b981', fill: true, tension: 0.3, pointRadius: 2 },
                        { label: 'Stock', data: sData, borderColor: '#3b82f6', tension: 0.3, pointRadius: 0 },
                        { label: 'Gold', data: gData, borderColor: '#fbbf24', tension: 0.3, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#475569' } },
                        y: { ticks: { display: !isPrivacyMode, color: '#475569' } }
                    }
                }
            });
        }

        // --- 股票功能 ---
        function saveStock() {
            const idx = parseInt(document.getElementById('stock-edit-idx').value);
            const r = { code: document.getElementById('stock-code').value.toUpperCase(), date: document.getElementById('stock-date').value || new Date().toISOString().split('T')[0], type: document.getElementById('stock-type').value, shares: parseFloat(document.getElementById('stock-shares').value)||0, buyPrice: parseFloat(document.getElementById('stock-buy-price').value)||0, cost: parseFloat(document.getElementById('stock-cost').value)||0, dividend: parseFloat(document.getElementById('stock-div-amount').value)||0 };
            if(!r.code) return;
            if(idx === -1) stockRecs.push(r); else stockRecs[idx] = r;
            saveAll(); clearStockForm(); updateUI();
        }
        function editStock(i) {
            const r = stockRecs[i];
            document.getElementById('stock-edit-idx').value = i;
            document.getElementById('stock-code').value = r.code;
            document.getElementById('stock-date').value = r.date;
            document.getElementById('stock-type').value = r.type;
            document.getElementById('stock-shares').value = r.shares;
            document.getElementById('stock-buy-price').value = r.buyPrice;
            document.getElementById('stock-cost').value = r.cost;
            document.getElementById('stock-div-amount').value = r.dividend || 0;
            document.getElementById('stock-input-card').classList.add('editing-mode');
            document.getElementById('stock-cancel').classList.remove('hidden');
            toggleStockDiv();
        }
        function clearStockForm() {
            document.getElementById('stock-edit-idx').value = "-1";
            document.getElementById('stock-input-card').classList.remove('editing-mode');
            document.getElementById('stock-cancel').classList.add('hidden');
            ['stock-code','stock-shares','stock-buy-price','stock-cost','stock-div-amount'].forEach(id => document.getElementById(id).value = "");
        }

        // --- 黃金功能 ---
        function saveGold() {
            const idx = parseInt(document.getElementById('gold-edit-idx').value);
            const r = {
                name: document.getElementById('gold-name').value || '未命名黃金',
                date: document.getElementById('gold-date').value || new Date().toISOString().split('T')[0],
                weight: parseFloat(document.getElementById('gold-weight').value)||0,
                unit: document.getElementById('gold-unit').value,
                cost: parseFloat(document.getElementById('gold-cost').value)||0
            };
            if(idx === -1) goldRecs.push(r); else goldRecs[idx] = r;
            saveAll(); clearGoldForm(); updateUI();
        }
        function editGold(i) {
            const r = goldRecs[i];
            document.getElementById('gold-edit-idx').value = i;
            document.getElementById('gold-name').value = r.name;
            document.getElementById('gold-date').value = r.date;
            document.getElementById('gold-weight').value = r.weight;
            document.getElementById('gold-unit').value = r.unit;
            document.getElementById('gold-cost').value = r.cost;
            document.getElementById('gold-input-card').classList.add('editing-mode');
            document.getElementById('gold-cancel').classList.remove('hidden');
        }
        function clearGoldForm() {
            document.getElementById('gold-edit-idx').value = "-1";
            document.getElementById('gold-input-card').classList.remove('editing-mode');
            document.getElementById('gold-cancel').classList.add('hidden');
            ['gold-name','gold-weight','gold-cost','gold-date'].forEach(id => document.getElementById(id).value = "");
        }

        // --- 通用功能 ---
        function updateMarketPrice() {
            const c = document.getElementById('market-code').value.toUpperCase();
            const p = parseFloat(document.getElementById('market-price').value);
            if(c && !isNaN(p)) { marketPrices[c] = p; saveAll(); updateUI(); }
        }
        function renderPriceTags() {
            let h = '';
            for(let c in marketPrices) {
                h += `<div class="bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/30 text-[10px] flex items-center gap-2 font-bold">${c}: ${isPrivacyMode?'***':'$'+marketPrices[c]}<button onclick="deletePrice('${c}')">✕</button></div>`;
            }
            document.getElementById('price-tags').innerHTML = h;
        }
        function deletePrice(c) { delete marketPrices[c]; saveAll(); updateUI(); }
        function del(t, i) { if(confirm("確定刪除？")) { if(t==='stk') stockRecs.splice(i,1); else goldRecs.splice(i,1); saveAll(); updateUI(); } }
        function switchTab(t) {
            document.getElementById('section-stock').classList.toggle('hidden', t!=='stock');
            document.getElementById('section-gold').classList.toggle('hidden', t!=='gold');
            document.getElementById('tab-stock').className = t==='stock' ? 'pb-4 text-sm font-bold tab-active' : 'pb-4 text-sm font-bold text-slate-500';
            document.getElementById('tab-gold').className = t==='gold' ? 'pb-4 text-sm font-bold tab-active' : 'pb-4 text-sm font-bold text-slate-500';
        }
        function toggleStockDiv() { document.getElementById('stock-div-field').classList.toggle('hidden', document.getElementById('stock-type').value !== 'dividend'); }
        function saveAll() {
            localStorage.setItem(K_STK, JSON.stringify(stockRecs));
            localStorage.setItem(K_GLD, JSON.stringify(goldRecs));
            localStorage.setItem(K_PRC, JSON.stringify(marketPrices));
        }
        function exportAllData() {
            const s = JSON.stringify({ stocks: stockRecs, golds: goldRecs, prices: marketPrices });
            const el = document.createElement('textarea'); el.value = s; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el); alert("數據已拷貝");
        }
        async function fetchAllPrices() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
                const d = await res.json();
                curGoldUSD = parseFloat(d.price);
                updateUI();
            } catch(e){ console.error("價格更新失敗"); }
        }

        updateUI(); fetchAllPrices();
    </script>
</body>
</html>
