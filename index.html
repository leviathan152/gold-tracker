<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金股財富智庫 v8.0 - 專業行情管理版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 1.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: #334155; transform: translateY(-2px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5); }
        .gold-text { color: #fbbf24; }
        .stock-text { color: #60a5fa; }
        .profit-pos { color: #4ade80; }
        .profit-neg { color: #f87171; }
        input, select { background-color: #020617 !important; border: 1px solid #334155 !important; color: white !important; border-radius: 10px; padding: 0.6rem 0.8rem; outline: none; }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .market-price-tag { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; }
        #help-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #help-modal.show { display: flex; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
            <div>
                <h1 class="text-3xl font-black gold-text tracking-tighter italic">QUANTUM WEALTH v8.0</h1>
                <p class="text-gray-500 text-xs mt-1 font-mono uppercase tracking-widest">Global Asset Intelligence System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchAllPrices()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2.5 rounded-full text-sm font-bold shadow-lg transition transform active:scale-95">↻ 刷新金價</button>
                <button onclick="toggleHelp()" class="bg-slate-800 p-2.5 rounded-full text-gray-400">🔍</button>
            </div>
        </header>

        <section class="mb-8">
            <div class="card border-l-4 border-indigo-500 bg-slate-900/50">
                <h3 class="text-indigo-400 text-sm font-bold mb-4 flex items-center">
                    <span class="mr-2">●</span> 全域股票現價管理 (在這裡填寫目前市價)
                </h3>
                <div id="market-price-container" class="flex flex-wrap gap-4">
                    </div>
                <p class="text-[10px] text-gray-500 mt-4 italic">※ 填寫後全站損益將自動連動更新</p>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-10">
            <div class="card lg:col-span-1 flex flex-col items-center justify-center relative min-h-[250px]">
                <canvas id="allocationChart"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="text-gray-500 text-[10px] uppercase tracking-widest">Total Asset</span>
                    <span id="center-total-worth" class="text-2xl font-black text-white">--</span>
                </div>
            </div>
            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card border-t-2 border-amber-500/50">
                    <span class="text-gray-500 text-xs uppercase tracking-widest">黃金現值</span>
                    <div id="gold-worth" class="text-2xl font-black gold-text mt-2">--</div>
                </div>
                <div class="card border-t-2 border-blue-500/50">
                    <span class="text-gray-500 text-xs uppercase tracking-widest">股票現值</span>
                    <div id="stock-worth" class="text-2xl font-black stock-text mt-2">--</div>
                </div>
                <div class="card border-t-2 border-emerald-500/50">
                    <span class="text-gray-500 text-xs uppercase tracking-widest">累積總損益</span>
                    <div id="total-profit" class="text-2xl font-black mt-2">--</div>
                    <div id="total-percent" class="text-xs font-mono mt-1">--</div>
                </div>
            </div>
        </section>

        <section class="card mb-10 bg-slate-950/50">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400 italic">Net Worth History</h3>
            </div>
            <div class="h-[250px]"><canvas id="trendChart"></canvas></div>
        </section>

        <div class="flex space-x-6 mb-8 border-b border-slate-800">
            <button id="tab-gold" onclick="switchTab('gold')" class="pb-4 px-2 font-black text-sm uppercase tracking-widest transition">Gold Holdings</button>
            <button id="tab-stock" onclick="switchTab('stock')" class="pb-4 px-2 font-black text-sm uppercase tracking-widest transition">Stock & Dividend</button>
        </div>

        <section id="content-stock" class="hidden animate-in fade-in duration-500">
            <div class="card border-l-4 border-blue-500 mb-8 bg-slate-900/30">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-gray-500 ml-1">標的代號</label>
                        <input type="text" id="stock-code" placeholder="如: 2330" class="text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-gray-500 ml-1">購買日期</label>
                        <input type="date" id="stock-date" class="text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-gray-500 ml-1">購入價格</label>
                        <input type="number" id="stock-buy-price" placeholder="單價" oninput="calcCost()" class="text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-gray-500 ml-1">股數</label>
                        <input type="number" id="stock-shares" placeholder="數量" oninput="calcCost()" class="text-sm">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-gray-500 ml-1">持有成本 (自動算)</label>
                        <input type="number" id="stock-total-cost" placeholder="總額" class="text-sm font-bold text-indigo-400">
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <select id="stock-type" class="text-xs bg-slate-800"><option value="buy">一般買入</option><option value="dividend">股利再投入</option></select>
                    <button onclick="addStockRecord()" class="bg-blue-600 hover:bg-blue-500 px-10 py-2 rounded-xl font-black text-xs shadow-lg transition">登錄交易紀錄</button>
                </div>
            </div>
            <div class="card overflow-x-auto p-0">
                <table class="w-full text-xs text-left">
                    <thead class="text-gray-500 bg-slate-900/50">
                        <tr>
                            <th class="p-4">購買日期</th><th class="p-4">標的</th><th class="p-4 text-right">股數</th><th class="p-4 text-right">購入價格</th><th class="p-4 text-right">持有成本</th><th class="p-4 text-right">現值/損益</th><th class="p-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="stock-list" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <section id="content-gold" class="animate-in fade-in duration-500">
            <div class="card border-l-4 border-amber-500 mb-8 bg-slate-900/30">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <input type="text" id="gold-name" placeholder="標的名" class="text-sm">
                    <input type="date" id="gold-date" class="text-sm">
                    <select id="gold-unit" class="text-sm"><option value="g">公克(g)</option><option value="tsubos">台錢</option></select>
                    <input type="number" id="gold-weight" placeholder="重量" class="text-sm">
                    <input type="number" id="gold-price" placeholder="購入總成本" class="text-sm">
                </div>
                <button onclick="addGoldRecord()" class="mt-4 w-full bg-amber-500 hover:bg-amber-600 py-3 rounded-xl font-black text-black text-xs transition shadow-lg">登錄黃金庫存</button>
            </div>
            <div id="gold-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <footer class="mt-12 flex justify-center gap-4">
            <button onclick="exportData()" class="text-[10px] text-gray-600 hover:text-white uppercase tracking-widest border border-slate-800 px-4 py-2 rounded-lg transition">Backup Database</button>
            <div class="relative"><input type="file" onchange="importData(this)" class="absolute inset-0 opacity-0 cursor-pointer"><button class="text-[10px] text-gray-600 hover:text-white uppercase tracking-widest border border-slate-800 px-4 py-2 rounded-lg transition">Sync History</button></div>
        </footer>
    </div>

    <div id="help-modal" onclick="toggleHelp()"><div class="card max-w-sm m-4 border-indigo-500 border-2" onclick="event.stopPropagation()"><h4 class="font-black mb-4 indigo-400">操作導引</h4><ul class="text-xs text-gray-400 space-y-2"><li>● <b>現價：</b> 在頂端「現價管理區」填寫一次，全站通用。</li><li>● <b>持有成本：</b> 輸入價格與股數後會自動算出。</li><li>● <b>備份：</b> 建議每週點擊 Backup 存檔。</li></ul></div></div>

    <script>
        const KEY_GOLD = 'wealth_v8_gold';
        const KEY_STOCK = 'wealth_v8_stock';
        const KEY_PRICES = 'wealth_v8_prices';
        const KEY_TREND = 'wealth_v8_trend';

        let goldRecs = JSON.parse(localStorage.getItem(KEY_GOLD)) || [];
        let stockRecs = JSON.parse(localStorage.getItem(KEY_STOCK)) || [];
        let marketPrices = JSON.parse(localStorage.getItem(KEY_PRICES)) || {};
        let trendData = JSON.parse(localStorage.getItem(KEY_TREND)) || [];
        let curGold = 0;
        const TWD_RATE = 32.75;

        function toggleHelp(){ document.getElementById('help-modal').classList.toggle('show'); }
        function switchTab(t){
            const isG = t==='gold';
            document.getElementById('content-gold').classList.toggle('hidden', !isG);
            document.getElementById('content-stock').classList.toggle('hidden', isG);
            const active = 'border-b-4 border-indigo-500 text-indigo-400';
            const inactive = 'text-gray-600 hover:text-gray-300';
            document.getElementById('tab-gold').className = `pb-4 px-2 font-black text-sm uppercase tracking-widest transition ${isG ? active : inactive}`;
            document.getElementById('tab-stock').className = `pb-4 px-2 font-black text-sm uppercase tracking-widest transition ${!isG ? active : inactive}`;
        }

        async function fetchAllPrices() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
                const d = await res.json(); curGold = parseFloat(d.price);
                updateUI();
                recordTrend();
            } catch(e){ console.log("Price Sync Error"); }
        }

        // 自動計算成本
        function calcCost() {
            const p = parseFloat(document.getElementById('stock-buy-price').value) || 0;
            const s = parseFloat(document.getElementById('stock-shares').value) || 0;
            document.getElementById('stock-total-cost').value = Math.round(p * s);
        }

        function updateMarketPrice(code, val) {
            marketPrices[code] = parseFloat(val) || 0;
            localStorage.setItem(KEY_PRICES, JSON.stringify(marketPrices));
            updateUI();
        }

        function addStockRecord() {
            const code = document.getElementById('stock-code').value.toUpperCase();
            if(!code) return;
            const r = {
                code,
                date: document.getElementById('stock-date').value || new Date().toISOString().split('T')[0],
                buyPrice: parseFloat(document.getElementById('stock-buy-price').value),
                shares: parseFloat(document.getElementById('stock-shares').value),
                cost: parseFloat(document.getElementById('stock-total-cost').value),
                type: document.getElementById('stock-type').value
            };
            stockRecs.push(r);
            localStorage.setItem(KEY_STOCK, JSON.stringify(stockRecs));
            if(marketPrices[code] === undefined) marketPrices[code] = r.buyPrice; // 預設現價為買入價
            localStorage.setItem(KEY_PRICES, JSON.stringify(marketPrices));
            updateUI();
        }

        function addGoldRecord() {
            const r = { name: document.getElementById('gold-name').value, date: document.getElementById('gold-date').value || new Date().toISOString().split('T')[0], unit: document.getElementById('gold-unit').value, weight: parseFloat(document.getElementById('gold-weight').value), price: parseFloat(document.getElementById('gold-price').value) };
            if(!r.name || isNaN(r.weight)) return; goldRecs.push(r); localStorage.setItem(KEY_GOLD, JSON.stringify(goldRecs)); updateUI();
        }

        function updateUI() {
            const goldTWD = (curGold / 31.1035) * TWD_RATE;
            
            // 1. 更新股票現價管理區
            const uniqueCodes = [...new Set(stockRecs.map(r => r.code))];
            let marketHTML = '';
            uniqueCodes.forEach(code => {
                marketHTML += `
                <div class="market-price-tag p-3 rounded-xl flex items-center gap-3">
                    <span class="text-[10px] font-black text-indigo-300 font-mono">${code}</span>
                    <input type="number" step="0.1" value="${marketPrices[code] || 0}" 
                        onchange="updateMarketPrice('${code}', this.value)" 
                        class="w-20 bg-transparent !border-none !p-0 text-right font-black text-sm text-white">
                </div>`;
            });
            document.getElementById('market-price-container').innerHTML = marketHTML || '<span class="text-gray-700 text-xs italic">尚未登錄任何股票...</span>';

            // 2. 渲染股票清單
            let sV=0, sC=0, sH='';
            stockRecs.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach((r, i) => {
                const nowP = marketPrices[r.code] || 0;
                const curV = nowP * r.shares;
                const prof = curV - r.cost;
                sV += curV; sC += r.cost;
                sH += `<tr class="hover:bg-slate-800/30 transition-colors font-mono">
                    <td class="p-4 text-gray-500">${r.date}</td>
                    <td class="p-4"><span class="bg-blue-900/30 text-blue-400 px-2 py-1 rounded text-[10px] font-black">${r.code}</span></td>
                    <td class="p-4 text-right">${r.shares.toLocaleString()}</td>
                    <td class="p-4 text-right text-gray-400">$${r.buyPrice.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold">$${r.cost.toLocaleString()}</td>
                    <td class="p-4 text-right ${prof>=0?'profit-pos':'profit-neg'} font-black">$${Math.round(curV).toLocaleString()}<br><small class="text-[9px] opacity-70">${prof>0?'+':''}${Math.round(prof).toLocaleString()}</small></td>
                    <td class="p-4 text-center"><button onclick="del('stock',${i})" class="text-gray-700 hover:text-red-500 transition">✕</button></td>
                </tr>`;
            });
            document.getElementById('stock-list').innerHTML = sH;

            // 3. 渲染黃金卡片
            let gV=0, gC=0, gH='';
            goldRecs.forEach((r, i) => {
                let w = r.weight; if(r.unit==='tsubos') w*=3.75;
                const v = w * goldTWD; gV += v; gC += r.price; const prof = v - r.price;
                gH += `<div class="card border-l-2 border-amber-500/30">
                    <div class="flex justify-between items-start mb-4">
                        <div><h4 class="font-black text-xs">${r.name}</h4><span class="text-[10px] text-gray-600">${r.date}</span></div>
                        <button onclick="del('gold',${i})" class="text-gray-700 hover:text-red-500">✕</button>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="text-[10px] text-gray-500">重量: ${r.weight}${r.unit}<br>成本: $${r.price.toLocaleString()}</div>
                        <div class="text-right"><div class="gold-text font-black">$${Math.round(v).toLocaleString()}</div><div class="${prof>=0?'profit-pos':'profit-neg'} text-[10px] font-bold">${Math.round(prof).toLocaleString()}</div></div>
                    </div>
                </div>`;
            });
            document.getElementById('gold-list-container').innerHTML = gH;

            // 總結面板
            const totalV = sV + gV; const totalC = sC + gC; const totalP = totalV - totalC;
            document.getElementById('center-total-worth').innerText = `NT$${Math.round(totalV/10000)}萬`;
            document.getElementById('gold-worth').innerText = `NT$ ${Math.round(gV).toLocaleString()}`;
            document.getElementById('stock-worth').innerText = `NT$ ${Math.round(sV).toLocaleString()}`;
            document.getElementById('total-profit').innerText = `NT$ ${Math.round(totalP).toLocaleString()}`;
            document.getElementById('total-profit').className = `text-2xl font-black mt-2 ${totalP>=0?'profit-pos':'profit-neg'}`;
            document.getElementById('total-percent').innerText = `${((totalP/totalC)*100 || 0).toFixed(2)}% Performance`;
            document.getElementById('total-percent').className = `text-xs font-mono mt-1 ${totalP>=0?'profit-pos':'profit-neg'}`;

            renderAllocation(gV, sV);
        }

        function del(t, i){ if(confirm("Confirm Delete?")){ const a = t==='gold'?goldRecs:stockRecs; a.splice(i,1); localStorage.setItem(t==='gold'?KEY_GOLD:KEY_STOCK, JSON.stringify(a)); updateUI(); } }

        let allocChart, trChart;
        function renderAllocation(g, s){
            const ctx = document.getElementById('allocationChart').getContext('2d');
            if(allocChart) allocChart.destroy();
            allocChart = new Chart(ctx, { type:'doughnut', data:{ datasets:[{ data:[g,s], backgroundColor:['#fbbf24','#3b82f6'], borderWidth:0, hoverOffset:10 }]}, options:{ cutout:'85%', plugins:{ tooltip:{enabled:false} } }});
        }

        function recordTrend() {
            const today = new Date().toISOString().slice(0, 10);
            const val = parseFloat(document.getElementById('center-total-worth').innerText.replace(/[^0-9.]/g, '')) * 10000;
            if(!val) return;
            if(trendData.length > 0 && trendData[trendData.length-1].date === today) trendData[trendData.length-1].value = val;
            else trendData.push({date:today, value:val});
            if(trendData.length > 100) trendData.shift();
            localStorage.setItem(KEY_TREND, JSON.stringify(trendData));
            renderTrend();
        }

        function renderTrend() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trChart) trChart.destroy();
            trChart = new Chart(ctx, {
                type:'line',
                data:{ labels: trendData.map(d=>d.date), datasets:[{ data: trendData.map(d=>d.value), borderColor:'#6366f1', borderWidth:3, fill:true, backgroundColor:'rgba(99,102,241,0.1)', tension:0.4, pointRadius:0 }]},
                options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{display:false}, y:{grid:{color:'#1e293b'}, ticks:{color:'#475569', font:{size:9}, callback: (v)=>v/10000+'萬'}} } }
            });
        }

        function exportData(){
            const d = JSON.stringify({gold:goldRecs, stock:stockRecs, prices:marketPrices, trend:trendData, v:8.0});
            const blob = new Blob([d], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download=`Wealth_v8_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }

        function importData(input){
            const reader = new FileReader();
            reader.onload = (e) => {
                const d = JSON.parse(e.target.result);
                goldRecs = d.gold; stockRecs = d.stock; marketPrices = d.prices; trendData = d.trend;
                localStorage.setItem(KEY_GOLD, JSON.stringify(goldRecs));
                localStorage.setItem(KEY_STOCK, JSON.stringify(stockRecs));
                localStorage.setItem(KEY_PRICES, JSON.stringify(marketPrices));
                localStorage.setItem(KEY_TREND, JSON.stringify(trendData));
                location.reload();
            };
            reader.readAsText(input.files[0]);
        }

        switchTab('gold'); fetchAllPrices();
    </script>
</body>
</html>
