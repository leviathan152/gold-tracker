<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資產配置管理系統 v19.1 - 時間維度強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; border-radius: 24px; padding: 1.5rem; }
        .stat-label { color: #94a3b8; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .gold-text { color: #fbbf24; }
        input, select { background-color: #020617 !important; border: 1px solid #334155 !important; color: white !important; border-radius: 12px; padding: 0.75rem; outline: none; }
        .tab-active { color: #818cf8; border-bottom: 3px solid #6366f1; }
        .editing-mode { border: 2px solid #fbbf24 !important; }
        .btn-primary { background: linear-gradient(to right, #4f46e5, #6366f1); }
        .chart-container { position: relative; height: 350px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
            <div>
                <h1 class="text-3xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-amber-200 to-indigo-400">Wealth Vision v19.1</h1>
                <p class="text-slate-500 text-xs mt-1">TIME-SERIES ANALYTICS ENABLED</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportAllData()" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold">📦 備份</button>
                <button onclick="importAllData()" class="bg-emerald-600/20 text-emerald-400 px-4 py-2 rounded-xl text-xs font-bold">📥 匯入</button>
                <button onclick="fetchAllPrices()" class="btn-primary px-4 py-2 rounded-xl text-xs font-bold">🔄 刷新金價</button>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="card lg:col-span-2">
                <h3 class="stat-label mb-4 italic">資產成長趨勢 (含股票與黃金時間軸)</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="card flex flex-col items-center justify-center">
                <h3 class="stat-label mb-4 italic">資產配置比例</h3>
                <div class="relative w-full max-w-[220px]">
                    <canvas id="allocationChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="center-total-worth" class="text-xl font-black">--</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
            <div class="card border-t-4 border-blue-500"><span class="stat-label">股票現值</span><div id="stock-worth" class="text-2xl font-bold mt-2">--</div><div id="stock-perf" class="text-xs font-bold">--</div></div>
            <div class="card border-t-4 border-amber-500"><span class="stat-label">黃金現值</span><div id="gold-worth" class="text-2xl font-bold mt-2">--</div><div id="gold-perf" class="text-xs font-bold">--</div></div>
            <div class="card border-t-4 border-emerald-500"><span class="stat-label">總資產現值</span><div id="total-all-worth" class="text-2xl font-bold mt-2 text-emerald-400">--</div><div id="total-all-perf" class="text-xs font-bold">--</div></div>
        </section>

        <div class="flex space-x-8 mb-8 border-b border-slate-800">
            <button id="tab-stock" onclick="switchTab('stock')" class="pb-4 text-sm font-bold tab-active">股票管理</button>
            <button id="tab-gold" onclick="switchTab('gold')" class="pb-4 text-sm font-bold text-slate-500">黃金管理</button>
        </div>

        <div id="section-stock">
            <div id="stock-input-card" class="card mb-8">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                    <input type="hidden" id="stock-edit-idx" value="-1">
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">代號</label><input type="text" id="stock-code" class="uppercase"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">日期</label><input type="date" id="stock-date"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">類型</label><select id="stock-type" onchange="toggleStockDiv()"><option value="buy">買入</option><option value="dividend">股利再投入</option></select></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">股數</label><input type="number" id="stock-shares"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">單價</label><input type="number" step="0.01" id="stock-buy-price"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">總成本</label><input type="number" id="stock-cost"></div>
                    <div id="stock-div-field" class="hidden flex flex-col gap-1"><label class="text-[10px] text-emerald-400">股利</label><input type="number" id="stock-div-amount"></div>
                </div>
                <button onclick="saveStock()" class="w-full mt-6 btn-primary py-3 rounded-xl font-bold">儲存股票交易</button>
            </div>
            <div class="card overflow-x-auto p-0"><table class="w-full text-xs text-left"><thead class="bg-slate-800 text-slate-400"><tr><th class="p-4">日期</th><th class="p-4">代號</th><th class="p-4 text-right">股數</th><th class="p-4 text-right">成本</th><th class="p-4 text-right">損益</th><th class="p-4 text-center">操作</th></tr></thead><tbody id="stock-list" class="divide-y divide-slate-800"></tbody></table></div>
        </div>

        <div id="section-gold" class="hidden">
            <div id="gold-input-card" class="card mb-8">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <input type="hidden" id="gold-edit-idx" value="-1">
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">資產名稱</label><input type="text" id="gold-name" placeholder="實體黃金"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">購買日期</label><input type="date" id="gold-date"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">重量</label><input type="number" step="0.01" id="gold-weight"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">單位</label><select id="gold-unit"><option value="g">公克 (g)</option><option value="ts">台錢</option></select></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-slate-500">購入總成本</label><input type="number" id="gold-cost"></div>
                </div>
                <button onclick="saveGold()" class="w-full mt-6 bg-amber-600 py-3 rounded-xl font-bold text-black">儲存黃金紀錄</button>
            </div>
            <div class="card overflow-x-auto p-0"><table class="w-full text-xs text-left"><thead class="bg-slate-800 text-slate-400"><tr><th class="p-4">日期</th><th class="p-4">名稱</th><th class="p-4 text-right">重量</th><th class="p-4 text-right">成本</th><th class="p-4 text-right">現值</th><th class="p-4 text-center">操作</th></tr></thead><tbody id="gold-list" class="divide-y divide-slate-800"></tbody></table></div>
        </div>
    </div>

    <script>
        const K_STK = 'WV191_STK', K_GLD = 'WV191_GLD', K_PRC = 'WV191_PRC';
        let stockRecs = JSON.parse(localStorage.getItem(K_STK)) || [];
        let goldRecs = JSON.parse(localStorage.getItem(K_GLD)) || [];
        let marketPrices = JSON.parse(localStorage.getItem(K_PRC)) || {};
        let curGoldUSD = 0, rateUSD = 32.75;

        function updateUI() {
            const goldTWD_g = (curGoldUSD / 31.1035) * rateUSD;
            let sV = 0, sC = 0, sD = 0, gV = 0, gC = 0;

            // 股票列表
            let sH = '';
            stockRecs.map((r, i) => ({...r, ori: i})).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => {
                const nowP = marketPrices[r.code] || r.buyPrice;
                const val = nowP * r.shares; sV += val; sD += (r.dividend || 0); sC += r.cost;
                sH += `<tr class="hover:bg-slate-800/50"><td class="p-4">${r.date}</td><td class="p-4 font-bold text-blue-400">${r.code}</td><td class="p-4 text-right">${r.shares}</td><td class="p-4 text-right">$${r.cost.toLocaleString()}</td><td class="p-4 text-right">$${Math.round(val).toLocaleString()}</td><td class="p-4 text-center"><button onclick="editStock(${r.ori})">✎</button></td></tr>`;
            });
            document.getElementById('stock-list').innerHTML = sH;

            // 黃金列表
            let gH = '';
            goldRecs.map((r, i) => ({...r, ori: i})).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => {
                let w = r.weight; if(r.unit==='ts') w *= 3.75;
                const val = w * goldTWD_g; gV += val; gC += r.cost;
                gH += `<tr class="hover:bg-slate-800/50"><td class="p-4">${r.date || '無日期'}</td><td class="p-4 font-bold text-amber-400">${r.name}</td><td class="p-4 text-right">${r.weight}${r.unit}</td><td class="p-4 text-right">$${r.cost.toLocaleString()}</td><td class="p-4 text-right">$${Math.round(val).toLocaleString()}</td><td class="p-4 text-center"><button onclick="editGold(${r.ori})">✎</button></td></tr>`;
            });
            document.getElementById('gold-list').innerHTML = gH;

            // 看板數值
            document.getElementById('stock-worth').innerText = `$${Math.round(sV).toLocaleString()}`;
            document.getElementById('gold-worth').innerText = `$${Math.round(gV).toLocaleString()}`;
            document.getElementById('total-all-worth').innerText = `$${Math.round(sV+gV).toLocaleString()}`;
            document.getElementById('center-total-worth').innerText = `$${Math.round(sV+gV).toLocaleString()}`;

            renderCharts(gV, sV);
        }

        // --- 圖表邏輯 (整合雙邊時間軸) ---
        let tChart, aChart;
        function renderCharts(gV, sV) {
            // 圓餅圖
            const ctxA = document.getElementById('allocationChart').getContext('2d');
            if(aChart) aChart.destroy();
            aChart = new Chart(ctxA, { type:'doughnut', data:{ labels:['Gold','Stock'], datasets:[{data:[gV||1, sV||1], backgroundColor:['#fbbf24','#3b82f6'], borderWidth:0}]}, options:{cutout:'85%', plugins:{legend:{display:false}}}});

            // 趨勢圖
            const timeline = [
                ...stockRecs.map(r => ({ date: r.date, type: 's', cost: r.cost })),
                ...goldRecs.map(r => ({ date: r.date, type: 'g', cost: r.cost }))
            ].sort((a,b) => new Date(a.date) - new Date(b.date));

            const labels = [], sD = [], gD = [], tD = [];
            let cs = 0, cg = 0;
            timeline.forEach(h => {
                labels.push(h.date);
                if(h.type==='s') cs += h.cost; else cg += h.cost;
                sD.push(cs); gD.push(cg); tD.push(cs+cg);
            });

            const ctxT = document.getElementById('trendChart').getContext('2d');
            if(tChart) tChart.destroy();
            tChart = new Chart(ctxT, {
                type:'line',
                data:{ labels, datasets:[
                    {label:'Total', data:tD, borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.1)', fill:true, tension:0.4},
                    {label:'Stock', data:sD, borderColor:'#3b82f6', tension:0.4},
                    {label:'Gold', data:gD, borderColor:'#fbbf24', tension:0.4}
                ]},
                options:{ responsive:true, maintainAspectRatio:false, scales:{ x:{ticks:{color:'#475569'}}, y:{grid:{color:'#1e293b'}, ticks:{color:'#475569'}} } }
            });
        }

        function saveStock() {
            const idx = parseInt(document.getElementById('stock-edit-idx').value);
            const r = { code: document.getElementById('stock-code').value.toUpperCase(), date: document.getElementById('stock-date').value, type: document.getElementById('stock-type').value, shares: parseFloat(document.getElementById('stock-shares').value)||0, buyPrice: parseFloat(document.getElementById('stock-buy-price').value)||0, cost: parseFloat(document.getElementById('stock-cost').value)||0, dividend: parseFloat(document.getElementById('stock-div-amount').value)||0 };
            if(!r.code) return; if(idx === -1) stockRecs.push(r); else stockRecs[idx] = r;
            saveAll(); clearStockForm(); updateUI();
        }

        function saveGold() {
            const idx = parseInt(document.getElementById('gold-edit-idx').value);
            const r = { name: document.getElementById('gold-name').value, date: document.getElementById('gold-date').value, weight: parseFloat(document.getElementById('gold-weight').value), unit: document.getElementById('gold-unit').value, cost: parseFloat(document.getElementById('gold-cost').value) };
            if(!r.name) return; if(idx === -1) goldRecs.push(r); else goldRecs[idx] = r;
            saveAll(); clearGoldForm(); updateUI();
        }

        function editGold(i) {
            const r = goldRecs[i]; document.getElementById('gold-edit-idx').value = i;
            document.getElementById('gold-name').value = r.name;
            document.getElementById('gold-date').value = r.date || "";
            document.getElementById('gold-weight').value = r.weight;
            document.getElementById('gold-unit').value = r.unit;
            document.getElementById('gold-cost').value = r.cost;
            document.getElementById('gold-input-card').classList.add('editing-mode');
        }

        function clearGoldForm() { document.getElementById('gold-edit-idx').value = "-1"; document.getElementById('gold-input-card').classList.remove('editing-mode'); }
        function saveAll() { localStorage.setItem(K_STK, JSON.stringify(stockRecs)); localStorage.setItem(K_GLD, JSON.stringify(goldRecs)); }
        function switchTab(t) { document.getElementById('section-stock').classList.toggle('hidden', t!=='stock'); document.getElementById('section-gold').classList.toggle('hidden', t!=='gold'); }
        async function fetchAllPrices() { try { const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT'); const d = await res.json(); curGoldUSD = parseFloat(d.price); updateUI(); } catch(e){} }
        
        updateUI(); fetchAllPrices();
    </script>
</body>
</html>
