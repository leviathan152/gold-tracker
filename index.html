<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的黃金追蹤器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; }
        .gold-text { color: #d4af37; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold gold-text">✦ 傑哥記錄 ✦</h1>
            <button onclick="fetchGoldPrice()" class="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded-lg transition">↻ 更新金價</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card text-center">
                <p class="text-gray-400 text-sm">國際金價 (USD/oz)</p>
                <p id="price-usd" class="text-2xl font-mono">載入中...</p>
            </div>
            <div class="card text-center">
                <p class="text-gray-400 text-sm">美元匯率 (USD/TWD)</p>
                <p id="rate-twd" class="text-2xl font-mono">32.15</p>
            </div>
            <div class="card text-center">
                <p class="text-gray-400 text-sm">台幣金價 (TWD/g)</p>
                <p id="price-twd-g" class="text-2xl font-mono gold-text">--</p>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card">
                <p class="text-xs text-gray-400">持倉總重(g)</p>
                <p id="total-weight" class="text-lg">0</p>
            </div>
            <div class="card">
                <p class="text-xs text-gray-400">總成本</p>
                <p id="total-cost" class="text-lg">0</p>
            </div>
            <div class="card">
                <p class="text-xs text-gray-400">當前市值</p>
                <p id="current-value" class="text-lg text-green-400">0</p>
            </div>
            <div class="card">
                <p class="text-xs text-gray-400">未實現損益</p>
                <p id="total-profit" class="text-lg">0</p>
            </div>
        </div>

        <section class="card mb-8">
            <h2 class="text-xl mb-4 border-b border-gray-700 pb-2">＋ 新增紀錄</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <input type="text" id="record-name" placeholder="名稱 (如: 台銀金幣)" class="bg-zinc-800 p-2 rounded border border-gray-600">
                <select id="unit-select" class="bg-zinc-800 p-2 rounded border border-gray-600">
                    <option value="g">公克 (g)</option>
                    <option value="tsubos">錢 (台錢)</option>
                    <option value="oz">盎司 (oz)</option>
                </select>
                <input type="number" id="record-weight" placeholder="重量" class="bg-zinc-800 p-2 rounded border border-gray-600">
                <input type="number" id="record-price" placeholder="總買入價格" class="bg-zinc-800 p-2 rounded border border-gray-600">
            </div>
            <button onclick="addRecord()" class="mt-4 w-full bg-yellow-700 p-2 rounded font-bold hover:bg-yellow-600">登錄紀錄</button>
        </section>

        <div class="card mb-8">
            <canvas id="profitChart" height="100"></canvas>
        </div>

        <section class="card">
            <h2 class="text-xl mb-4">持倉清單</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="py-2">名稱</th>
                            <th>重量</th>
                            <th>買入成本</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="record-list">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let currentGoldPriceUSD = 0;
        const usdToTwd = 32.15; // 預設匯率
        let records = JSON.parse(localStorage.getItem('gold_records')) || [];

        // 1. 取得金價 (使用開放 API)
        async function fetchGoldPrice() {
            try {
                // 這裡使用一個展示用的 API，實務上建議申請免費的 GoldAPI key
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
                const data = await response.json();
                currentGoldPriceUSD = parseFloat(data.price);
                updateUI();
            } catch (error) {
                console.error("無法取得金價", error);
                document.getElementById('price-usd').innerText = "連線失敗";
            }
        }

        // 2. 更新介面數值
        function updateUI() {
            const pricePerGram = (currentGoldPriceUSD / 31.1035) * usdToTwd;
            document.getElementById('price-usd').innerText = `$ ${currentGoldPriceUSD.toLocaleString()}`;
            document.getElementById('price-twd-g').innerText = `NT$ ${Math.round(pricePerGram).toLocaleString()}`;

            let totalWeightG = 0;
            let totalCost = 0;
            let listHTML = '';

            records.forEach((r, index) => {
                let weightG = r.weight;
                if(r.unit === 'tsubos') weightG = r.weight * 3.75;
                if(r.unit === 'oz') weightG = r.weight * 31.1035;
                
                totalWeightG += weightG;
                totalCost += r.price;

                listHTML += `
                    <tr class="border-b border-zinc-800">
                        <td class="py-3">${r.name}</td>
                        <td>${r.weight} ${r.unit}</td>
                        <td>$${r.price.toLocaleString()}</td>
                        <td><button onclick="deleteRecord(${index})" class="text-red-500 text-sm">刪除</button></td>
                    </tr>
                `;
            });

            const currentValue = totalWeightG * pricePerGram;
            document.getElementById('total-weight').innerText = totalWeightG.toFixed(2);
            document.getElementById('total-cost').innerText = Math.round(totalCost).toLocaleString();
            document.getElementById('current-value').innerText = Math.round(currentValue).toLocaleString();
            document.getElementById('total-profit').innerText = Math.round(currentValue - totalCost).toLocaleString();
            document.getElementById('total-profit').className = (currentValue - totalCost) >= 0 ? 'text-lg text-green-400' : 'text-lg text-red-400';
            document.getElementById('record-list').innerHTML = listHTML;

            updateChart(totalCost, currentValue);
        }

        // 3. 新增紀錄
        function addRecord() {
            const name = document.getElementById('record-name').value;
            const unit = document.getElementById('unit-select').value;
            const weight = parseFloat(document.getElementById('record-weight').value);
            const price = parseFloat(document.getElementById('record-price').value);

            if(!name || !weight || !price) return alert("請填寫完整資訊");

            records.push({ name, unit, weight, price });
            localStorage.setItem('gold_records', JSON.stringify(records));
            updateUI();
        }

        // 4. 刪除紀錄
        function deleteRecord(index) {
            records.splice(index, 1);
            localStorage.setItem('gold_records', JSON.stringify(records));
            updateUI();
        }

        // 5. 圖表渲染
        let myChart;
        function updateChart(cost, value) {
            const ctx = document.getElementById('profitChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['總成本', '當前市值'],
                    datasets: [{
                        label: '金額 (TWD)',
                        data: [cost, value],
                        backgroundColor: ['#444', '#d4af37']
                    }]
                },
                options: { 
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { color: '#333' } } }
                }
            });
        }

        // 初始化
        fetchGoldPrice();
    </script>
</body>
</html>
